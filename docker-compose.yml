version: "3.9"

services:
  backend:
    build: ./backend
    container_name: pathforge-backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    networks:
      - pathforge-net

  frontend:
    build: ./frontend
    container_name: pathforge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - pathforge-net

networks:
  pathforge-net:
    driver: bridge
